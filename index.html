<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語帳アプリ</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin:0;
    padding:10px;
    background:#f5f5f5;
  }

  h1{
    text-align:center;
  }

  input, select, textarea, button{
    margin:5px 0;
    padding:8px;
    font-size:16px;
    box-sizing:border-box;
  }

  button{
    cursor:pointer;
  }

  #word-list{
    margin-top:20px;
  }

  .word-item{
    padding:10px;
    background:#fff;
    margin-bottom:8px;
    border-radius:8px;
    display:flex;
    justify-content: space-between;
    align-items:center;
    flex-wrap:wrap;
  }

  .word-info{
    flex:1;
  }

  @media(max-width:600px){
    button{
      width:100%;
      font-size:18px;
    }
    input, select, textarea{
      width:100%;
    }
  }
</style>
</head>
<body>

<h1>単語帳アプリ</h1>

<div>
  <input type="text" id="word-input" placeholder="英単語">
  <select id="pos-input">
    <option value="動詞">動詞</option>
    <option value="名詞">名詞</option>
    <option value="形容詞">形容詞</option>
    <option value="副詞">副詞</option>
  </select>
  <textarea id="note-input" placeholder="補足（活用・類義語など）"></textarea>
  <button onclick="addWord()">単語追加</button>
</div>

<hr>

<div>
  <select id="filter-pos">
    <option value="">全て</option>
    <option value="動詞">動詞</option>
    <option value="名詞">名詞</option>
    <option value="形容詞">形容詞</option>
    <option value="副詞">副詞</option>
  </select>
  <button onclick="showWords()">フィルター適用</button>
  <button onclick="startQuiz()">出題モード</button>
</div>

<div id="word-list"></div>

<script>
let words = [];

// LocalStorage から読み込み
if(localStorage.getItem('words')){
  words = JSON.parse(localStorage.getItem('words'));
  showWords();
}

function saveWords(){
  localStorage.setItem('words', JSON.stringify(words));
}

function addWord(){
  const word = document.getElementById('word-input').value.trim();
  const pos = document.getElementById('pos-input').value;
  const note = document.getElementById('note-input').value.trim();
  if(word === '') return alert('単語を入力してください');
  words.push({word,pos,note});
  saveWords();
  document.getElementById('word-input').value='';
  document.getElementById('note-input').value='';
  showWords();
}

function deleteWord(index){
  if(confirm('削除しますか？')){
    words.splice(index,1);
    saveWords();
    showWords();
  }
}

function showWords(){
  const filter = document.getElementById('filter-pos').value;
  const listDiv = document.getElementById('word-list');
  listDiv.innerHTML='';
  words.forEach((w,i)=>{
    if(filter && w.pos !== filter) return;
    const div = document.createElement('div');
    div.className='word-item';
    div.innerHTML = `<div class="word-info">
                      <strong>${w.word}</strong> (${w.pos})<br>
                      <em>${w.note}</em>
                     </div>
                     <button onclick="deleteWord(${i})">削除</button>`;
    listDiv.appendChild(div);
  });
}

// 出題モード
function startQuiz(){
  if(words.length===0) return alert('単語がありません');
  let quizWords = [...words];
  quizWords = quizWords.sort(()=>Math.random()-0.5);
  let idx = 0;

  function next(){
    if(idx >= quizWords.length){
      alert('出題終了！');
      showWords();
      return;
    }
    const answer = prompt(`単語: ${quizWords[idx].word}\n意味・補足を入力してみて`);
    alert(`答え: ${quizWords[idx].note || '（補足なし）'}`);
    idx++;
    next();
  }
  next();
}
</script>

</body>
</html>
